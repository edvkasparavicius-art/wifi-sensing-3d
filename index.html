<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050810">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Wi-Fi Sensing · 2 Kambariai</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#050810;--surface:#0c1120;--surface2:#101a2e;
            --border:#16233d;--border2:#1e3050;
            --ink:#dce4f0;--ink2:#6880a4;--ink3:#354566;
            --blue:#3b82f6;--cyan:#06d6f2;--green:#22c97a;
            --red:#ef4456;--amber:#f5a623;--violet:#8b5cf6;
            --safe-b:env(safe-area-inset-bottom,0px);
        }
        html,body{height:100%;overflow:hidden}
        body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}

        /* ═══ 3D ═══ */
        #scene{position:fixed;inset:0;z-index:0}

        /* ═══ HUD ═══ */
        .hud{position:fixed;inset:0;z-index:10;pointer-events:none;padding:12px;display:flex;flex-direction:column;justify-content:space-between}
        .hud>*{pointer-events:auto}

        /* Top */
        .hud-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
        .hud-brand{display:flex;align-items:center;gap:7px;padding:7px 12px;background:#0c1120cc;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:9px}
        .hud-brand__icon{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,var(--blue),var(--violet));display:flex;align-items:center;justify-content:center;font-size:13px}
        .hud-brand__text{font-size:0.82rem;font-weight:700;letter-spacing:-0.01em}
        .hud-brand__tag{font-size:0.5rem;font-weight:600;color:var(--cyan);background:#06d6f215;padding:2px 5px;border-radius:3px;margin-left:3px}

        /* Room tabs */
        .room-tabs{display:flex;gap:4px;padding:3px;background:#0c1120cc;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:9px}
        .room-tab{position:relative;padding:7px 14px;font-family:'Sora',sans-serif;font-size:0.72rem;font-weight:600;border:none;border-radius:6px;background:transparent;color:var(--ink2);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.25s}
        .room-tab.active{background:#3b82f618;color:var(--blue)}
        .room-tab:active{transform:scale(0.95)}
        .room-tab__dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 5px #22c97a55;flex-shrink:0;transition:all 0.3s}
        .room-tab__dot.motion{background:var(--red);box-shadow:0 0 8px #ef445688;animation:blink 0.5s infinite}
        .room-tab__dot.presence{background:var(--amber);box-shadow:0 0 6px #f5a62355}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

        /* Alert pill */
        .alert-pill{display:flex;align-items:center;gap:6px;padding:7px 12px;background:#0c1120cc;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:9px;font-size:0.72rem;font-weight:600;transition:all 0.4s;white-space:nowrap}
        .alert-pill .a-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px #22c97a55;transition:all 0.3s}
        .alert-pill.motion{border-color:#ef445666;box-shadow:0 0 16px #ef445633}
        .alert-pill.motion .a-dot{background:var(--red);box-shadow:0 0 8px #ef445688;animation:blink .5s infinite}
        .alert-pill.presence{border-color:#f5a62344}
        .alert-pill.presence .a-dot{background:var(--amber);box-shadow:0 0 6px #f5a62355}

        /* Center flash */
        .flash{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);text-align:center;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:20}
        .flash.visible{opacity:1}
        .flash__icon{font-size:44px;animation:pop .4s ease-out}
        @keyframes pop{0%{transform:scale(.5)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
        .flash__text{font-size:1rem;font-weight:700;text-shadow:0 2px 16px #000a;margin-top:6px}
        .flash__sub{font-size:0.72rem;color:var(--ink2);margin-top:3px}
        .flash__room{font-size:0.65rem;color:var(--cyan);margin-top:6px;padding:3px 10px;background:#06d6f212;border-radius:4px;display:inline-block}

        /* Bottom */
        .hud-bottom{display:flex;flex-direction:column;gap:6px;padding-bottom:var(--safe-b)}

        /* Room overview cards */
        .room-cards{display:grid;grid-template-columns:1fr 1fr;gap:6px}
        .room-card{padding:10px;background:#0c1120cc;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:9px;cursor:pointer;transition:all 0.3s}
        .room-card:active{transform:scale(0.97)}
        .room-card.active{border-color:#3b82f644}
        .room-card.motion{border-color:#ef445666;box-shadow:0 0 12px #ef445622}
        .room-card__head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
        .room-card__name{font-size:0.72rem;font-weight:600}
        .room-card__status{font-size:0.6rem;font-weight:600;padding:2px 6px;border-radius:3px}
        .room-card__status.clear{color:var(--green);background:#22c97a12}
        .room-card__status.motion{color:var(--red);background:#ef445618}
        .room-card__status.presence{color:var(--amber);background:#f5a62318}
        .room-card__metrics{display:flex;gap:8px}
        .room-card__m{text-align:center;flex:1}
        .room-card__m-val{font-family:'DM Mono',monospace;font-size:0.85rem;font-weight:500;color:var(--cyan)}
        .room-card__m-lbl{font-size:0.5rem;color:var(--ink3);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}

        /* Controls row */
        .hud-ctrl{display:flex;gap:5px;align-items:center}
        .hud-ctrl__slider-wrap{flex:1;display:flex;align-items:center;gap:6px;padding:7px 10px;background:#0c1120cc;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:8px}
        .hud-ctrl__slider-label{font-size:0.65rem;color:var(--ink2);white-space:nowrap}
        .hud-ctrl__slider-val{font-family:'DM Mono',monospace;font-size:0.68rem;color:var(--cyan);min-width:28px;text-align:right}
        input[type="range"]{-webkit-appearance:none;flex:1;height:4px;border-radius:2px;background:linear-gradient(90deg,var(--green),var(--amber),var(--red));outline:none}
        input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--ink);border:3px solid var(--surface);box-shadow:0 2px 8px #00000066}
        .hud-btn{padding:8px 12px;font-family:'Sora',sans-serif;font-size:0.68rem;font-weight:600;border:1px solid var(--border);border-radius:7px;background:#0c1120cc;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:var(--ink);cursor:pointer;white-space:nowrap}
        .hud-btn:active{transform:scale(.95)}

        /* View pills */
        .hud-views{display:flex;gap:3px;justify-content:center}
        .hud-view{padding:5px 10px;font-family:'Sora',sans-serif;font-size:0.62rem;font-weight:600;border:1px solid var(--border);border-radius:5px;background:#0c1120aa;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);color:var(--ink2);cursor:pointer}
        .hud-view.active{background:#3b82f622;border-color:#3b82f644;color:var(--blue)}
        .hud-view:active{transform:scale(.95)}

        /* Loading */
        .loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999;transition:opacity .8s}
        .loading.hidden{opacity:0;pointer-events:none}
        .loading-sp{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite}
        @keyframes sp{to{transform:rotate(360deg)}}
        .loading-msg{font-size:.78rem;color:var(--ink2)}

        ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    </style>
</head>

<script type="module">
import * as THREE from 'three';

// ═══════════════════════════════════════
// KONFIGŪRACIJA
// ═══════════════════════════════════════
const SAMPLE_RATE = 10;
const GRID = 36;
const WAVE_SCALE = 3.0;
const MOTION_THRESHOLD = 2.5;
const PRESENCE_THRESHOLD = 1.2;
const CALIB_COUNT = 60;
const COOLDOWN_MS = 3000;

// ═══════════════════════════════════════
// KAMBARIŲ APIBRĖŽIMAI
// ═══════════════════════════════════════
const ROOMS = [
    {
        name: '🛋 Svetainė',
        baseRssi: -50,
        size: { w: 22, d: 16 },
        routerPos: { x: -8, z: -5 },
        // Judesys kas ~18s trukmė 5s
        motionCycle: 22, motionStart: 12, motionEnd: 17,
        motionFreq: 0.9, motionAmp: 6,
        // Buvimas kas ~45s
        presenceCycle: 45, presenceStart: 30, presenceEnd: 40,
        wallColor: 0x121d35,
        floorColor: 0x0e1830,
        routerColor: 0x22c97a,
        humanRestPos: { x: 4, z: 2 }
    },
    {
        name: '🛏 Miegamasis',
        baseRssi: -56,
        size: { w: 16, d: 12 },
        routerPos: { x: -5, z: -3 },
        // Judesys kas ~30s trukmė 4s (rečiau nei svetainėje)
        motionCycle: 30, motionStart: 18, motionEnd: 22,
        motionFreq: 0.6, motionAmp: 4.5,
        // Buvimas kas ~35s
        presenceCycle: 35, presenceStart: 8, presenceEnd: 18,
        wallColor: 0x1a1535,
        floorColor: 0x10102a,
        routerColor: 0x06d6f2,
        humanRestPos: { x: 2, z: 0 }
    }
];

// ═══════════════════════════════════════
// DOM
// ═══════════════════════════════════════
const $ = id => document.getElementById(id);
const alertPill = $('alertPill');
const alertText = $('alertText');
const flash = $('flash');
const flashIcon = $('flashIcon');
const flashText = $('flashText');
const flashSub = $('flashSub');
const flashRoom = $('flashRoom');
const sensRange = $('sensRange');
const sensDisp = $('sensDisp');
const roomCardsEl = $('roomCards');
const loadingEl = $('loading');

// ═══════════════════════════════════════
// BŪSENA
// ═══════════════════════════════════════
let activeRoom = 0;
let currentView = 'room';
let sensitivity = 1.0;
let paused = false;
let flashTimeout = null;

// Kiekvienas kambarys turi savo signalų procesorių
class RoomState {
    constructor(config, index) {
        this.config = config;
        this.index = index;
        this.rssiBuffer = [];
        this.filteredRssi = [];
        this.csiBuffer = [];
        this.t = Math.random() * 10; // offset kad nesutaptų
        this.calibrated = false;
        this.calibCount = 0;
        this.baselineRssi = 0;
        this.lastAlertTime = 0;
        this.result = null;
    }

    generateSample() {
        this.t += 1.0 / SAMPLE_RATE;
        const cfg = this.config;
        const noise = gaussRandom() * 0.4;

        const cycle = this.t % cfg.motionCycle;
        let motion = 0;
        if (cycle > cfg.motionStart && cycle < cfg.motionEnd) {
            motion = cfg.motionAmp * Math.sin(2 * Math.PI * cfg.motionFreq * this.t);
            motion += 1.5 * Math.sin(2 * Math.PI * (cfg.motionFreq * 1.8) * this.t);
        }

        let presence = 0;
        const cycle2 = this.t % cfg.presenceCycle;
        if (cycle2 > cfg.presenceStart && cycle2 < cfg.presenceEnd) {
            presence = 0.8 * Math.sin(2 * Math.PI * 0.28 * this.t);
        }

        const rssi = cfg.baseRssi + noise + motion + presence;

        const csi = [];
        for (let i = 0; i < 30; i++) {
            let v = 10 + gaussRandom() * 0.08;
            if (cycle > cfg.motionStart && cycle < cfg.motionEnd) v += gaussRandom() * 2.5;
            csi.push(v);
        }
        return { rssi, csi };
    }

    process(sample) {
        this.rssiBuffer.push(sample.rssi);
        if (this.rssiBuffer.length > 50) this.rssiBuffer.shift();

        const alpha = 0.3;
        if (this.filteredRssi.length === 0) {
            this.filteredRssi.push(sample.rssi);
        } else {
            this.filteredRssi.push(alpha * sample.rssi + (1 - alpha) * this.filteredRssi[this.filteredRssi.length - 1]);
        }
        if (this.filteredRssi.length > 120) this.filteredRssi.shift();

        this.csiBuffer.push(sample.csi);
        if (this.csiBuffer.length > 20) this.csiBuffer.shift();

        if (!this.calibrated) {
            this.calibCount++;
            if (this.calibCount >= CALIB_COUNT) {
                let s = 0;
                for (let i = 0; i < this.rssiBuffer.length; i++) s += this.rssiBuffer[i];
                this.baselineRssi = s / this.rssiBuffer.length;
                this.calibrated = true;
            }
            return null;
        }

        const n = this.rssiBuffer.length;
        let mean = 0, variance = 0;
        for (let i = 0; i < n; i++) mean += this.rssiBuffer[i];
        mean /= n;
        for (let i = 0; i < n; i++) variance += (this.rssiBuffer[i] - mean) ** 2;
        variance /= n;
        const std = Math.sqrt(variance);
        const delta = Math.abs(mean - this.baselineRssi);

        const fft = this.computeFFT();

        let csiVar = 0;
        if (this.csiBuffer.length >= 5) {
            const recent = this.csiBuffer.slice(-10);
            const nSub = recent[0].length;
            let total = 0;
            for (let s = 0; s < nSub; s++) {
                let m = 0;
                for (let i = 0; i < recent.length; i++) m += recent[i][s];
                m /= recent.length;
                let v = 0;
                for (let i = 0; i < recent.length; i++) v += (recent[i][s] - m) ** 2;
                total += v / recent.length;
            }
            csiVar = total / nSub;
        }

        const adj = MOTION_THRESHOLD / sensitivity;
        const rssiScore = delta / Math.max(adj, 0.1);
        const csiScore = csiVar / Math.max(adj * 0.5, 0.1);
        let fftScore = 0;
        if (fft.peakFreq >= 0.1 && fft.peakFreq <= 2.0) {
            fftScore = fft.peakPower / Math.max(adj * 0.3, 0.1);
        }
        const combined = rssiScore * 0.3 + csiScore * 0.5 + fftScore * 0.2;
        const confidence = Math.min(1.0, combined);
        const motionDetected = combined > 1.0;
        const presAdj = PRESENCE_THRESHOLD / sensitivity;
        const presenceDetected = !motionDetected && (std > presAdj || csiVar > presAdj * 0.3);

        this.result = { motion: motionDetected, presence: presenceDetected, confidence, rssiMean: mean, variance, fftPeakFreq: fft.peakFreq, delta, csiVar };
        return this.result;
    }

    computeFFT() {
        const empty = { freqs: [], mags: [], peakFreq: 0, peakPower: 0 };
        if (this.filteredRssi.length < 64) return empty;
        const data = this.filteredRssi.slice(-64);
        const N = data.length;
        const windowed = data.map((v, i) => v * (0.5 - 0.5 * Math.cos(2 * Math.PI * i / (N - 1))));
        const freqs = [], mags = [];
        let peakMag = 0, peakIdx = 0;
        for (let k = 1; k <= N / 2; k++) {
            let re = 0, im = 0;
            for (let n = 0; n < N; n++) {
                const a = 2 * Math.PI * k * n / N;
                re += windowed[n] * Math.cos(a);
                im -= windowed[n] * Math.sin(a);
            }
            const mag = 2 * Math.sqrt(re * re + im * im) / N;
            freqs.push(k * SAMPLE_RATE / N);
            mags.push(mag);
            if (mag > peakMag) { peakMag = mag; peakIdx = freqs.length - 1; }
        }
        return { freqs: freqs.slice(0, 20), mags: mags.slice(0, 20), peakFreq: freqs[peakIdx] || 0, peakPower: peakMag };
    }

    recalibrate() {
        this.calibrated = false;
        this.calibCount = 0;
        this.rssiBuffer = [];
        this.filteredRssi = [];
        this.csiBuffer = [];
        this.result = null;
    }
}

function gaussRandom() {
    let u1 = Math.random(), u2 = Math.random();
    if (u1 < 1e-10) u1 = 1e-10;
    return Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
}

const rooms = ROOMS.map((cfg, i) => new RoomState(cfg, i));

// ═══════════════════════════════════════
// THREE.JS SCENA
// ═══════════════════════════════════════
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x050810);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050810, 0.03);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 16, 20);
camera.lookAt(0, 0, 0);

// Apšvietimas
scene.add(new THREE.AmbientLight(0x1a2a4a, 0.6));
const dirLight = new THREE.DirectionalLight(0x3b82f6, 0.4);
dirLight.position.set(10, 20, 5);
scene.add(dirLight);

const pLight1 = new THREE.PointLight(0x3b82f6, 1.0, 35);
pLight1.position.set(-8, 8, -8);
scene.add(pLight1);

const pLight2 = new THREE.PointLight(0x8b5cf6, 0.6, 35);
pLight2.position.set(8, 5, 8);
scene.add(pLight2);

const alertLight = new THREE.PointLight(0xff0000, 0, 40);
alertLight.position.set(0, 10, 0);
scene.add(alertLight);

// Dalelės
const pCount = 150;
const pGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(pCount * 3);
for (let i = 0; i < pCount; i++) {
    pPos[i*3] = (Math.random()-0.5)*40;
    pPos[i*3+1] = Math.random()*12;
    pPos[i*3+2] = (Math.random()-0.5)*40;
}
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({ color: 0x3b82f6, size: 0.05, transparent: true, opacity: 0.3 }));
scene.add(particles);

// ═══ KAMBARIO OBJEKTAI (po vieną kiekvienam) ═══
const roomObjects = ROOMS.map((cfg, idx) => {
    const group = new THREE.Group();
    group.visible = idx === 0;
    scene.add(group);

    const hw = cfg.size.w / 2, hd = cfg.size.d / 2;

    // Grindys
    const fGeo = new THREE.PlaneGeometry(cfg.size.w, cfg.size.d);
    fGeo.rotateX(-Math.PI / 2);
    group.add(new THREE.Mesh(fGeo, new THREE.MeshPhongMaterial({ color: cfg.floorColor, emissive: 0x060c1a })));

    // Sienos
    const wMat = new THREE.MeshPhongMaterial({ color: cfg.wallColor, emissive: 0x080e1a, transparent: true, opacity: 0.35, side: THREE.DoubleSide });
    const makeW = (w, h, x, y, z, ry) => {
        const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), wMat);
        m.position.set(x, y, z); m.rotation.y = ry;
        group.add(m);
    };
    makeW(cfg.size.w, 5, 0, 2.5, -hd, 0);
    makeW(cfg.size.w, 5, 0, 2.5, hd, 0);
    makeW(cfg.size.d, 5, -hw, 2.5, 0, Math.PI/2);
    makeW(cfg.size.d, 5, hw, 2.5, 0, Math.PI/2);

    // Grid
    const grid = new THREE.GridHelper(Math.max(cfg.size.w, cfg.size.d), 20, 0x16233d, 0x0c1528);
    grid.position.y = 0.01;
    group.add(grid);

    // Routeris
    const rMat = new THREE.MeshPhongMaterial({ color: cfg.routerColor, emissive: 0x0a3a2a });
    const rBody = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.3, 0.4), rMat);
    rBody.position.set(cfg.routerPos.x, 1.15, cfg.routerPos.z);
    group.add(rBody);
    // Antena
    const rAnt = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.8, 6), rMat);
    rAnt.position.set(cfg.routerPos.x + 0.15, 1.7, cfg.routerPos.z);
    group.add(rAnt);
    // Staliukas
    const tableMat = new THREE.MeshPhongMaterial({ color: 0x2a2018, emissive: 0x0a0a08 });
    const tableTop = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.06, 0.8), tableMat);
    tableTop.position.set(cfg.routerPos.x, 1.0, cfg.routerPos.z);
    group.add(tableTop);
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 1.0, 6), tableMat);
    for (const ox of [-0.4, 0.4]) {
        for (const oz of [-0.25, 0.25]) {
            const l = leg.clone();
            l.position.set(cfg.routerPos.x + ox, 0.5, cfg.routerPos.z + oz);
            group.add(l);
        }
    }

    // Routerio šviesa
    const rLight = new THREE.PointLight(cfg.routerColor === 0x22c97a ? 0x22c97a : 0x06d6f2, 0.7, 12);
    rLight.position.set(cfg.routerPos.x, 2.5, cfg.routerPos.z);
    group.add(rLight);

    // Signalo bangos
    const rings = [];
    for (let i = 0; i < 4; i++) {
        const rGeo = new THREE.RingGeometry(2 + i*2.2, 2.08 + i*2.2, 48);
        rGeo.rotateX(-Math.PI/2);
        const rMesh = new THREE.Mesh(rGeo, new THREE.MeshBasicMaterial({ color: cfg.routerColor, transparent: true, opacity: 0.1 - i*0.02, side: THREE.DoubleSide }));
        rMesh.position.set(cfg.routerPos.x, 0.08, cfg.routerPos.z);
        group.add(rMesh);
        rings.push(rMesh);
    }

    // Žmogaus silhuetas
    const humanG = new THREE.Group();
    humanG.visible = false;
    const hMat = new THREE.MeshPhongMaterial({ color: 0xef4456, emissive: 0x4a1118 });
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.35, 1.4, 8), hMat);
    body.position.y = 0.7;
    humanG.add(body);
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.25, 10, 8), hMat);
    head.position.y = 1.7;
    humanG.add(head);
    humanG.position.set(cfg.humanRestPos.x, 0, cfg.humanRestPos.z);
    group.add(humanG);

    // Baldai pagal kambarį
    const furnMat = new THREE.MeshPhongMaterial({ color: 0x1a2040, emissive: 0x080c18 });
    if (idx === 0) {
        // Svetainė: sofa
        const sofa = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.8, 1.2), furnMat);
        sofa.position.set(3, 0.4, 5);
        group.add(sofa);
        const sofaBack = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.6, 0.2), furnMat);
        sofaBack.position.set(3, 0.9, 5.5);
        group.add(sofaBack);
        // TV
        const tvMat = new THREE.MeshPhongMaterial({ color: 0x0a0a14, emissive: 0x1a1a3a });
        const tv = new THREE.Mesh(new THREE.BoxGeometry(2.5, 1.4, 0.08), tvMat);
        tv.position.set(3, 2.2, -hd + 0.15);
        group.add(tv);
    } else {
        // Miegamasis: lova
        const bedFrame = new THREE.Mesh(new THREE.BoxGeometry(3, 0.4, 4), furnMat);
        bedFrame.position.set(2, 0.2, 0);
        group.add(bedFrame);
        const mattress = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.25, 3.8), new THREE.MeshPhongMaterial({ color: 0x202848, emissive: 0x101428 }));
        mattress.position.set(2, 0.53, 0);
        group.add(mattress);
        const headboard = new THREE.Mesh(new THREE.BoxGeometry(3, 1.2, 0.15), furnMat);
        headboard.position.set(2, 0.9, -2);
        group.add(headboard);
    }

    return { group, rings, humanG, hMat };
});

// ═══ BANGŲ PAVIRŠIUS ═══
const waveGeo = new THREE.PlaneGeometry(26, 26, GRID-1, GRID-1);
waveGeo.rotateX(-Math.PI/2);
const waveMat = new THREE.MeshPhongMaterial({ color: 0x1a3a6a, emissive: 0x0a1a3a, specular: 0x3b82f6, shininess: 60, transparent: true, opacity: 0.7, side: THREE.DoubleSide });
const waveMesh = new THREE.Mesh(waveGeo, waveMat);
waveMesh.position.y = 2;
waveMesh.visible = false;
scene.add(waveMesh);

const wireGeo = waveGeo.clone();
const wireMesh = new THREE.Mesh(wireGeo, new THREE.MeshBasicMaterial({ color: 0x3b82f6, wireframe: true, transparent: true, opacity: 0.1 }));
wireMesh.position.y = 2.01;
wireMesh.visible = false;
scene.add(wireMesh);

const waveGrid = new THREE.GridHelper(28, 28, 0x16233d, 0x0c1528);
waveGrid.position.y = -0.5;
waveGrid.visible = false;
scene.add(waveGrid);

// ═══════════════════════════════════════
// KAMERA
// ═══════════════════════════════════════
let camAngle = 0, targetAngle = 0, isDrag = false, lastX = 0;

canvas.addEventListener('touchstart', e => { isDrag = true; lastX = e.touches[0].clientX; }, { passive: true });
canvas.addEventListener('touchmove', e => { if (!isDrag) return; targetAngle -= (e.touches[0].clientX - lastX) * 0.005; lastX = e.touches[0].clientX; }, { passive: true });
canvas.addEventListener('touchend', () => { isDrag = false; }, { passive: true });
canvas.addEventListener('mousedown', e => { isDrag = true; lastX = e.clientX; });
canvas.addEventListener('mousemove', e => { if (!isDrag) return; targetAngle -= (e.clientX - lastX) * 0.005; lastX = e.clientX; });
canvas.addEventListener('mouseup', () => { isDrag = false; });

function updateCamera() {
    if (!isDrag) targetAngle += 0.002;
    camAngle += (targetAngle - camAngle) * 0.05;
    const r = currentView === 'wave' ? 26 : 20;
    const h = currentView === 'wave' ? 16 : 13;
    camera.position.x = Math.sin(camAngle) * r;
    camera.position.z = Math.cos(camAngle) * r;
    camera.position.y += (h - camera.position.y) * 0.03;
    camera.lookAt(0, currentView === 'wave' ? 0 : 1, 0);
}

// ═══════════════════════════════════════
// 3D ATNAUJINIMAI
// ═══════════════════════════════════════
let waveTime = 0;

function updateWave(result) {
    waveTime += 0.04;
    const positions = waveMesh.geometry.attributes.position;
    const wirePos = wireMesh.geometry.attributes.position;
    const amp = result ? result.confidence * WAVE_SCALE * 2 : 0;

    for (let i = 0; i < positions.count; i++) {
        const x = positions.getX(i), z = positions.getZ(i);
        const dist = Math.sqrt(x*x + z*z);
        let y = Math.sin(dist * 0.4 - waveTime * 2) * 0.3;
        if (amp > 0.1) {
            y += Math.sin(dist * 0.8 - waveTime * 4) * amp * 0.5;
            y += Math.sin(x * 0.3 + waveTime * 3) * amp * 0.3;
        }
        positions.setY(i, y);
        wirePos.setY(i, y);
    }
    positions.needsUpdate = true;
    wirePos.needsUpdate = true;
    waveMesh.geometry.computeVertexNormals();

    // Spalva pagal statusą
    if (result && result.motion) {
        waveMat.color.lerp(new THREE.Color(0x4a1a1a), 0.08);
        waveMat.emissive.lerp(new THREE.Color(0x2a0a0a), 0.08);
    } else {
        waveMat.color.lerp(new THREE.Color(0x1a3a6a), 0.03);
        waveMat.emissive.lerp(new THREE.Color(0x0a1a3a), 0.03);
    }
}

function updateRoomScene(roomIdx, result) {
    const obj = roomObjects[roomIdx];
    const cfg = ROOMS[roomIdx];
    const elapsed = rooms[roomIdx].t;

    // Bangos
    for (let i = 0; i < obj.rings.length; i++) {
        const sc = 1 + Math.sin(elapsed * 2 - i * 0.8) * 0.1;
        obj.rings[i].scale.set(sc, 1, sc);
        obj.rings[i].material.opacity = 0.08 - i * 0.015 + Math.sin(elapsed * 3) * 0.015;
    }

    if (result && result.motion) {
        obj.humanG.visible = true;
        obj.humanG.position.x = cfg.humanRestPos.x + Math.sin(elapsed * 1.2) * 2;
        obj.humanG.position.z = cfg.humanRestPos.z + Math.cos(elapsed * 0.8) * 1.5;
        obj.hMat.emissive.setHex(0x6a1118);
    } else if (result && result.presence) {
        obj.humanG.visible = true;
        obj.humanG.position.x = cfg.humanRestPos.x + Math.sin(elapsed * 0.1) * 0.15;
        obj.hMat.emissive.setHex(0x4a3510);
        obj.hMat.color.setHex(0xf5a623);
    } else {
        obj.humanG.visible = false;
        obj.hMat.color.setHex(0xef4456);
    }
}

// ═══════════════════════════════════════
// UI
// ═══════════════════════════════════════
function updateHUD() {
    const r = rooms[activeRoom].result;

    // Active room alert pill
    if (r && r.motion) {
        alertPill.className = 'alert-pill motion';
        alertText.textContent = 'JUDESYS!';
        alertLight.intensity = 2;
        alertLight.color.setHex(0xff3344);
    } else if (r && r.presence) {
        alertPill.className = 'alert-pill presence';
        alertText.textContent = 'Buvimas';
        alertLight.intensity = 0.5;
        alertLight.color.setHex(0xf5a623);
    } else {
        alertPill.className = 'alert-pill';
        alertText.textContent = 'Ramu';
        alertLight.intensity *= 0.92;
    }

    // Tab dots
    for (let i = 0; i < 2; i++) {
        const dot = $('tabDot' + i);
        const ri = rooms[i].result;
        if (ri && ri.motion) {
            dot.className = 'room-tab__dot motion';
        } else if (ri && ri.presence) {
            dot.className = 'room-tab__dot presence';
        } else {
            dot.className = 'room-tab__dot';
        }
    }

    // Overview cards
    for (let i = 0; i < 2; i++) {
        const ri = rooms[i].result;
        const card = $('card' + i);
        const status = $('cardStatus' + i);

        if (ri && ri.motion) {
            card.className = 'room-card motion';
            status.className = 'room-card__status motion';
            status.textContent = 'Judesys!';
        } else if (ri && ri.presence) {
            card.className = 'room-card';
            status.className = 'room-card__status presence';
            status.textContent = 'Buvimas';
        } else {
            card.className = 'room-card';
            status.className = 'room-card__status clear';
            status.textContent = 'Ramu';
        }
        if (i === activeRoom) card.classList.add('active');

        $('cardRssi' + i).textContent = ri ? ri.rssiMean.toFixed(0) : '—';
        $('cardVar' + i).textContent = ri ? ri.variance.toFixed(1) : '—';
        $('cardConf' + i).textContent = ri ? (ri.confidence * 100).toFixed(0) + '%' : '—';
    }
}

function showFlash(icon, text, sub, roomName) {
    flashIcon.textContent = icon;
    flashText.textContent = text;
    flashSub.textContent = sub;
    flashRoom.textContent = roomName;
    flash.classList.add('visible');
    if (flashTimeout) clearTimeout(flashTimeout);
    flashTimeout = setTimeout(() => flash.classList.remove('visible'), 2200);
}

function switchRoom(idx) {
    activeRoom = idx;
    document.querySelectorAll('.room-tab').forEach((tab, i) => {
        tab.classList.toggle('active', i === idx);
    });
    roomObjects.forEach((obj, i) => {
        if (currentView === 'room') obj.group.visible = i === idx;
    });
}

function switchView(view) {
    currentView = view;
    document.querySelectorAll('.hud-view').forEach(v => v.classList.toggle('active', v.dataset.view === view));

    waveMesh.visible = view === 'wave';
    wireMesh.visible = view === 'wave';
    waveGrid.visible = view === 'wave';
    roomObjects.forEach((obj, i) => obj.group.visible = view === 'room' && i === activeRoom);
    roomCardsEl.style.display = view === 'overview' ? 'grid' : 'none';

    if (view === 'overview') {
        roomObjects.forEach(obj => obj.group.visible = false);
    }
}

// Event listeners
document.querySelectorAll('.room-tab').forEach(tab => {
    tab.addEventListener('click', () => switchRoom(parseInt(tab.dataset.room)));
});

document.querySelectorAll('.hud-view').forEach(btn => {
    btn.addEventListener('click', () => switchView(btn.dataset.view));
});

document.querySelectorAll('.room-card').forEach(card => {
    card.addEventListener('click', () => {
        switchRoom(parseInt(card.dataset.room));
        switchView('room');
    });
});

sensRange.addEventListener('input', () => {
    sensitivity = parseFloat(sensRange.value);
    sensDisp.textContent = sensitivity.toFixed(1) + 'x';
});

$('btnRecal').addEventListener('click', () => {
    rooms.forEach(r => r.recalibrate());
    loadingEl.classList.remove('hidden');
});

$('btnPause').addEventListener('click', () => {
    paused = !paused;
    $('btnPause').textContent = paused ? '▶' : '⏸';
});

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ═══════════════════════════════════════
// PAGRINDINIS CIKLAS
// ═══════════════════════════════════════
let lastTick = 0;
const tickInterval = 1000 / SAMPLE_RATE;

function animate(ts) {
    requestAnimationFrame(animate);

    if (!paused && ts - lastTick >= tickInterval) {
        lastTick = ts;

        let allCalibrated = true;
        for (let i = 0; i < rooms.length; i++) {
            const sample = rooms[i].generateSample();
            const result = rooms[i].process(sample);
            if (!rooms[i].calibrated) allCalibrated = false;

            // Flash pranešimas apie judesį bet kuriame kambaryje
            if (result && result.motion) {
                const now = Date.now();
                if (now - rooms[i].lastAlertTime > COOLDOWN_MS) {
                    rooms[i].lastAlertTime = now;
                    showFlash('⚠', 'Judesys aptiktas!', 'Patikimumas: ' + (result.confidence * 100).toFixed(0) + '%', ROOMS[i].name);
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                }
            }
        }

        if (allCalibrated) loadingEl.classList.add('hidden');
        updateHUD();
    }

    updateCamera();

    if (currentView === 'wave') {
        updateWave(rooms[activeRoom].result);
    } else if (currentView === 'room') {
        updateRoomScene(activeRoom, rooms[activeRoom].result);
    } else if (currentView === 'overview') {
        // Overview — atnaujinti abu kambarius fone (nors nerodomi)
    }

    particles.rotation.y += 0.0003;
    renderer.render(scene, camera);
}

animate(0);
</script>
</body>
</html>
